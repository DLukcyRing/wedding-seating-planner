<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>婚礼座位安排 | Wedding Seating Planner</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
            background: linear-gradient(135deg, #fff5f7 0%, #ffe8ec 100%);
            min-height: 100vh;
            color: #333;
        }

        .header {
            background: linear-gradient(135deg, #ffe8ec 0%, #ffd1dc 100%);
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #ffb3c1;
        }

        .header h1 {
            font-size: 3em;
            color: #ff4d6d;
            margin-bottom: 10px;
            font-weight: normal;
        }

        .header p {
            font-size: 1.2em;
            color: #88505a;
        }

        .nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 15px;
            background: #fff;
            border-bottom: 1px solid #ffd1dc;
            flex-wrap: wrap;
        }

        .nav button {
            padding: 10px 25px;
            background: #ffe8ec;
            border: 2px solid #ffb3c1;
            border-radius: 20px;
            color: #ff4d6d;
            font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav button:hover {
            background: #ff4d6d;
            color: #fff;
        }

        .container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
        }

        .panel {
            background: #fff;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(255, 77, 109, 0.1);
            border: 2px solid #ffe8ec;
        }

        .panel h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.8em;
            font-weight: normal;
            border-bottom: 2px solid #ffe8ec;
            padding-bottom: 10px;
        }

        .search-box {
            margin-bottom: 20px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #ffe8ec;
            border-radius: 10px;
            font-size: 1em;
            font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
        }

        .search-box input:focus {
            outline: none;
            border-color: #ffb3c1;
        }

        .file-upload {
            margin-bottom: 15px;
        }

        .file-upload input[type="file"] {
            display: none;
        }

        .file-upload label {
            display: block;
            width: 100%;
            padding: 12px 20px;
            background: linear-gradient(135deg, #ffb3c1 0%, #ffd1dc 100%);
            color: #333;
            border: 2px dashed #ff4d6d;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
        }

        .file-upload label:hover {
            background: linear-gradient(135deg, #ffd1dc 0%, #ffe8ec 100%);
            transform: translateY(-2px);
        }

        .upload-info {
            font-size: 0.85em;
            color: #88505a;
            text-align: center;
            margin-top: 5px;
        }

        .guest-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .guest-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #fff5f7;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: grab;
            transition: all 0.3s ease;
            border: 1px solid #ffe8ec;
        }

        .guest-item:hover {
            background: #ffe8ec;
            transform: translateX(5px);
        }

        .guest-item.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }

        .guest-name {
            font-weight: 500;
            color: #333;
        }

        .guest-actions button {
            background: none;
            border: none;
            color: #ff4d6d;
            cursor: pointer;
            font-size: 1.2em;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background 0.3s ease;
        }

        .guest-actions button:hover {
            background: #ffe8ec;
        }

        .action-buttons {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, #ff4d6d 0%, #ff6b8a 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 77, 109, 0.3);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #fff 0%, #fff5f7 100%);
            color: #ff4d6d;
            border: 2px solid #ffb3c1;
        }

        .btn-secondary:hover {
            background: #ffe8ec;
        }

        .seating-area {
            background: linear-gradient(135deg, #fff5f7 0%, #ffe8ec 100%);
            border-radius: 20px;
            padding: 30px;
            min-height: 600px;
            position: relative;
        }

        .table {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            border: 3px solid #ffb3c1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: move;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.2);
            transition: transform 0.3s ease;
        }

        .table:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 77, 109, 0.3);
        }

        .table-label {
            position: absolute;
            top: -35px;
            background: #fff;
            padding: 5px 15px;
            border-radius: 15px;
            font-weight: bold;
            color: #333;
            border: 2px solid #ffb3c1;
            white-space: nowrap;
        }

        .table-controls {
            position: absolute;
            top: -60px;
            display: flex;
            gap: 8px;
        }

        .table-controls button {
            width: 30px;
            height: 30px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }

        .table-controls .settings-btn {
            background: #fff;
            color: #333;
            border: 2px solid #ffb3c1;
        }

        .table-controls .delete-btn {
            background: #ff4d6d;
            color: #fff;
        }

        .table-controls button:hover {
            transform: scale(1.1);
        }

        .seat {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #fff;
            border: 2px dashed #ffb3c1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            position: absolute;
            transition: all 0.3s ease;
        }

        .seat.occupied {
            background: #ffd1dc;
            border-style: solid;
        }

        .seat.drag-over {
            background: #ffb3c1;
            transform: scale(1.1);
        }

        .seats-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            border: 3px solid #ffe8ec;
        }

        .modal-content h3 {
            color: #ff4d6d;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ffe8ec;
            border-radius: 10px;
            font-size: 1em;
            font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #ffb3c1;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .modal-buttons .btn {
            flex: 1;
        }

        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>婚礼座位安排</h1>
        <p>设计您完美的婚礼座位布局</p>
    </div>

    <div class="nav">
        <button onclick="openGuestModal()">💒 添加宾客</button>
        <button onclick="openTableModal()">🪑 添加餐桌</button>
        <button onclick="exportSeatingPlan()">📥 导出座位安排</button>
    </div>

    <div class="container">
        <div class="main-content">
            <div class="panel">
                <h2>宾客名单</h2>
                <div class="file-upload">
                    <input type="file" id="excel-file" accept=".xlsx,.xls,.csv" onchange="importExcel(event)">
                    <label for="excel-file">📁 点击上传Excel文件</label>
                    <div class="upload-info">支持 .xlsx, .xls, .csv 格式，第一列为宾客姓名</div>
                </div>
                <div class="search-box">
                    <input type="text" id="guest-search" placeholder="搜索宾客..." oninput="searchGuests()">
                </div>
                <div class="guest-list" id="guest-list">
                </div>
                <div class="action-buttons">
                    <button class="btn btn-secondary" onclick="openGuestModal()">➕ 添加宾客</button>

                    <button class="btn btn-secondary" onclick="openTableModal()">➕ 添加餐桌</button>
                </div>
            </div>

            <div class="seating-area" id="seating-area">
                <h2 style="text-align: center; margin-bottom: 20px; color: #333;">婚礼座位图</h2>
            </div>
        </div>
    </div>

    <div class="modal" id="guest-modal">
        <div class="modal-content">
            <h3>添加新宾客</h3>
            <div class="form-group">
                <label>宾客姓名</label>
                <input type="text" id="guest-name" placeholder="请输入宾客姓名">
            </div>
            <div class="form-group">
                <label>宾客类型</label>
                <select id="guest-type">
                    <option value="family">家人</option>
                    <option value="friend">朋友</option>
                    <option value="colleague">同事</option>
                    <option value="other">其他</option>
                </select>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="closeGuestModal()">取消</button>
                <button class="btn" onclick="addGuest()">添加宾客</button>
            </div>
        </div>
    </div>

    <div class="modal" id="table-modal">
        <div class="modal-content">
            <h3>添加新餐桌</h3>
            <div class="form-group">
                <label>餐桌名称</label>
                <input type="text" id="table-name" placeholder="例如：主桌">
            </div>
            <div class="form-group">
                <label>座位数量</label>
                <select id="table-seats">
                    <option value="4">4 个座位</option>
                    <option value="6" selected>6 个座位</option>
                    <option value="8">8 个座位</option>
                    <option value="10">10 个座位</option>
                    <option value="12">12 个座位</option>
                </select>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="closeTableModal()">取消</button>
                <button class="btn" onclick="addTable()">添加餐桌</button>
            </div>
        </div>
    </div>

    <div class="modal" id="table-settings-modal">
        <div class="modal-content">
            <h3>餐桌设置</h3>
            <div class="form-group">
                <label>餐桌名称</label>
                <input type="text" id="settings-table-name">
            </div>
            <div class="form-group">
                <label>座位数量</label>
                <select id="settings-table-seats">
                    <option value="4">4 个座位</option>
                    <option value="6">6 个座位</option>
                    <option value="8">8 个座位</option>
                    <option value="10">10 个座位</option>
                    <option value="12">12 个座位</option>
                </select>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="closeTableSettingsModal()">取消</button>
                <button class="btn" onclick="saveTableSettings()">保存</button>
            </div>
        </div>
    </div>

    <script>
        let guests = [];
        let tables = [];
        let currentEditingTableId = null;

        function initDemoData() {
            guests = [
                { id: 1, name: '张三', type: 'family', seated: false, tableId: null, seatIndex: null },
                { id: 2, name: '李四', type: 'friend', seated: false, tableId: null, seatIndex: null },
                { id: 3, name: '王五', type: 'family', seated: false, tableId: null, seatIndex: null },
                { id: 4, name: '赵六', type: 'colleague', seated: false, tableId: null, seatIndex: null },
                { id: 5, name: '孙七', type: 'friend', seated: false, tableId: null, seatIndex: null },
                { id: 6, name: '周八', type: 'family', seated: false, tableId: null, seatIndex: null }
            ];

            tables = [
                { id: 1, name: '主桌', seats: 8, x: 200, y: 150, assignedGuests: [] },
                { id: 2, name: '亲友桌', seats: 6, x: 50, y: 350, assignedGuests: [] },
                { id: 3, name: '同事桌', seats: 6, x: 450, y: 350, assignedGuests: [] }
            ];
        }

        function importExcel(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                    let importedCount = 0;
                    jsonData.forEach((row, index) => {
                        if (row[0] && row[0].toString().trim()) {
                            const name = row[0].toString().trim();
                            const type = row[1] ? row[1].toString().trim() : 'other';
                            
                            const newGuest = {
                                id: Date.now() + index,
                                name: name,
                                type: type,
                                seated: false,
                                tableId: null,
                                seatIndex: null
                            };
                            guests.push(newGuest);
                            importedCount++;
                        }
                    });

                    alert(`成功导入 ${importedCount} 位宾客！`);
                    renderGuestList(document.getElementById('guest-search').value);
                } catch (error) {
                    alert('导入失败，请检查文件格式是否正确！');
                    console.error(error);
                }
            };
            reader.readAsArrayBuffer(file);
            event.target.value = '';
        }

        function renderGuestList(filter = '') {
            const guestList = document.getElementById('guest-list');
            const filteredGuests = guests.filter(g => 
            g.name.toLowerCase().includes(filter.toLowerCase())
            );
            
            guestList.innerHTML = filteredGuests.map(guest => `
                <div class="guest-item" draggable="true" 
                    ondragstart="dragStart(event, ${guest.id})"
                    ondragend="dragEnd(event)">
                    <span class="guest-name">${guest.name} ${guest.seated ? '✓' : ''}</span>
                    <div class="guest-actions">
                        <button onclick="removeGuest(${guest.id})" title="Remove">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function renderTables() {
            const seatingArea = document.getElementById('seating-area');
            seatingArea.innerHTML = '<h2 style="text-align: center; margin-bottom: 20px; color: #333;">婚礼座位图</h2>';

            tables.forEach(table => {
                const tableEl = document.createElement('div');
                tableEl.className = 'table';
                tableEl.id = `table-${table.id}`;
                tableEl.style.left = table.x + 'px';
                tableEl.style.top = table.y + 'px';
                tableEl.style.width = (table.seats * 20 + 60) + 'px';
                tableEl.style.height = (table.seats * 20 + 60) + 'px';

                tableEl.innerHTML = `
                    <div class="table-controls">
                        <button class="settings-btn" onclick="openTableSettingsModal(${table.id})" title="Settings">⚙️</button>
                        <button class="delete-btn" onclick="removeTable(${table.id})" title="Delete">🗑️</button>
                    </div>
                    <div class="table-label">${table.name}</div>
                    <div class="seats-container" id="seats-${table.id}"></div>
                `;

                tableEl.addEventListener('mousedown', startDragTable);
                tableEl.addEventListener('touchstart', startDragTable);
                
                seatingArea.appendChild(tableEl);
                renderSeats(table);
            });
        }

        function renderSeats(table) {
            const seatsContainer = document.getElementById(`seats-${table.id}`);
            if (!seatsContainer) return;

            seatsContainer.innerHTML = '';
            const tableSize = table.seats * 20 + 60;
            const radius = tableSize / 2 - 25;

            for (let i = 0; i < table.seats; i++) {
                const angle = (i / table.seats) * 2 * Math.PI - Math.PI / 2;
                const x = tableSize / 2 + radius * Math.cos(angle) - 22.5;
                const y = tableSize / 2 + radius * Math.sin(angle) - 22.5;

                const seat = document.createElement('div');
                seat.className = 'seat';
                seat.style.left = x + 'px';
                seat.style.top = y + 'px';
                seat.dataset.tableId = table.id;
                seat.dataset.seatIndex = i;

                const assignedGuest = table.assignedGuests[i];
                if (assignedGuest) {
                    seat.classList.add('occupied');
                    seat.textContent = assignedGuest.name.substring(0, 2);
                    seat.title = assignedGuest.name;
                    seat.style.cursor = 'pointer';
                    seat.addEventListener('click', () => unseatGuest(table.id, i));
                } else {
                    seat.addEventListener('dragover', dragOver);
                    seat.addEventListener('dragleave', dragLeave);
                    seat.addEventListener('drop', drop);
                }

                seatsContainer.appendChild(seat);
            }
        }

        function dragStart(e, guestId) {
            e.dataTransfer.setData('guestId', guestId);
            e.target.classList.add('dragging');
        }

        function dragEnd(e) {
            e.target.classList.remove('dragging');
        }

        function dragOver(e) {
            e.preventDefault();
            e.target.classList.add('drag-over');
        }

        function dragLeave(e) {
            e.target.classList.remove('drag-over');
        }

        function drop(e) {
            e.preventDefault();
            e.target.classList.remove('drag-over');

            const guestId = parseInt(e.dataTransfer.getData('guestId'));
            const tableId = parseInt(e.target.dataset.tableId);
            const seatIndex = parseInt(e.target.dataset.seatIndex);

            seatGuest(guestId, tableId, seatIndex);
        }

        function seatGuest(guestId, tableId, seatIndex) {
            const guest = guests.find(g => g.id === guestId);
            const table = tables.find(t => t.id === tableId);

            if (!guest || !table) return;

            if (guest.seated) {
                const oldTable = tables.find(t => t.id === guest.tableId);
                if (oldTable) {
                    oldTable.assignedGuests[guest.seatIndex] = null;
                }
            }

            if (table.assignedGuests[seatIndex]) {
                const existingGuest = table.assignedGuests[seatIndex];
                existingGuest.seated = false;
                existingGuest.tableId = null;
                existingGuest.seatIndex = null;
            }

            guest.seated = true;
            guest.tableId = tableId;
            guest.seatIndex = seatIndex;
            table.assignedGuests[seatIndex] = guest;

            renderGuestList(document.getElementById('guest-search').value);
            renderSeats(table);
        }

        function unseatGuest(tableId, seatIndex) {
            const table = tables.find(t => t.id === tableId);
            const guest = table.assignedGuests[seatIndex];

            if (guest) {
                guest.seated = false;
                guest.tableId = null;
                guest.seatIndex = null;
                table.assignedGuests[seatIndex] = null;

                renderGuestList(document.getElementById('guest-search').value);
                renderSeats(table);
            }
        }

        let draggedTable = null;
        let dragOffsetX = 0;
        let dragOffsetY = 0;

        function startDragTable(e) {
            if (e.target.closest('.table-controls')) return;
            if (e.target.closest('.seat')) return;

            draggedTable = e.currentTarget;
            const rect = draggedTable.getBoundingClientRect();
            const seatingAreaRect = document.getElementById('seating-area').getBoundingClientRect();

            dragOffsetX = e.clientX - rect.left;
            dragOffsetY = e.clientY - rect.top;

            document.addEventListener('mousemove', dragTable);
            document.addEventListener('mouseup', stopDragTable);
            document.addEventListener('touchmove', dragTableTouch);
            document.addEventListener('touchend', stopDragTable);
        }

        function dragTable(e) {
            if (!draggedTable) return;
            const seatingArea = document.getElementById('seating-area');
            const rect = seatingArea.getBoundingClientRect();

            let x = e.clientX - rect.left - dragOffsetX;
            let y = e.clientY - rect.top - dragOffsetY;

            x = Math.max(0, Math.min(x, seatingArea.offsetWidth - draggedTable.offsetWidth));
            y = Math.max(80, Math.min(y, seatingArea.offsetHeight - draggedTable.offsetHeight));

            draggedTable.style.left = x + 'px';
            draggedTable.style.top = y + 'px';

            const tableId = parseInt(draggedTable.id.replace('table-', ''));
            const table = tables.find(t => t.id === tableId);
            if (table) {
                table.x = x;
                table.y = y;
            }
        }

        function dragTableTouch(e) {
            if (!draggedTable || !e.touches[0]) return;
            e.preventDefault();
            const touch = e.touches[0];
            const seatingArea = document.getElementById('seating-area');
            const rect = seatingArea.getBoundingClientRect();

            let x = touch.clientX - rect.left - dragOffsetX;
            let y = touch.clientY - rect.top - dragOffsetY;

            x = Math.max(0, Math.min(x, seatingArea.offsetWidth - draggedTable.offsetWidth));
            y = Math.max(80, Math.min(y, seatingArea.offsetHeight - draggedTable.offsetHeight));

            draggedTable.style.left = x + 'px';
            draggedTable.style.top = y + 'px';

            const tableId = parseInt(draggedTable.id.replace('table-', ''));
            const table = tables.find(t => t.id === tableId);
            if (table) {
                table.x = x;
                table.y = y;
            }
        }

        function stopDragTable() {
            draggedTable = null;
            document.removeEventListener('mousemove', dragTable);
            document.removeEventListener('mouseup', stopDragTable);
            document.removeEventListener('touchmove', dragTableTouch);
            document.removeEventListener('touchend', stopDragTable);
        }

        function openGuestModal() {
            document.getElementById('guest-modal').classList.add('active');
            document.getElementById('guest-name').value = '';
            document.getElementById('guest-type').value = 'family';
        }

        function closeGuestModal() {
            document.getElementById('guest-modal').classList.remove('active');
        }

        function addGuest() {
            const name = document.getElementById('guest-name').value.trim();
            const type = document.getElementById('guest-type').value;

            if (!name) {
                alert('请输入宾客姓名');
                return;
            }

            const newGuest = {
                id: Date.now(),
                name: name,
                type: type,
                seated: false,
                tableId: null,
                seatIndex: null
            };

            guests.push(newGuest);
            closeGuestModal();
            renderGuestList(document.getElementById('guest-search').value);
        }

        function removeGuest(guestId) {
            const guest = guests.find(g => g.id === guestId);
            if (guest && guest.seated) {
                const table = tables.find(t => t.id === guest.tableId);
                if (table) {
                    table.assignedGuests[guest.seatIndex] = null;
                    renderSeats(table);
                }
            }

            guests = guests.filter(g => g.id !== guestId);
            renderGuestList(document.getElementById('guest-search').value);
        }

        function openTableModal() {
            document.getElementById('table-modal').classList.add('active');
            document.getElementById('table-name').value = `餐桌 ${tables.length + 1}`;
            document.getElementById('table-seats').value = '6';
        }

        function closeTableModal() {
            document.getElementById('table-modal').classList.remove('active');
        }

        function addTable() {
            const name = document.getElementById('table-name').value.trim();
            const seats = parseInt(document.getElementById('table-seats').value);

            if (!name) {
                alert('请输入餐桌名称');
                return;
            }

            const newTable = {
                id: Date.now(),
                name: name,
                seats: seats,
                x: 100 + Math.random() * 300,
                y: 100 + Math.random() * 300,
                assignedGuests: new Array(seats).fill(null)
            };

            tables.push(newTable);
            closeTableModal();
            renderTables();
        }

        function removeTable(tableId) {
            const table = tables.find(t => t.id === tableId);
            if (table) {
                table.assignedGuests.forEach(guest => {
                    if (guest) {
                        guest.seated = false;
                        guest.tableId = null;
                        guest.seatIndex = null;
                    }
                });
            }

            tables = tables.filter(t => t.id !== tableId);
            renderGuestList(document.getElementById('guest-search').value);
            renderTables();
        }

        function openTableSettingsModal(tableId) {
            currentEditingTableId = tableId;
            const table = tables.find(t => t.id === tableId);
            if (table) {
                document.getElementById('settings-table-name').value = table.name;
                document.getElementById('settings-table-seats').value = table.seats;
                document.getElementById('table-settings-modal').classList.add('active');
            }
        }

        function closeTableSettingsModal() {
            document.getElementById('table-settings-modal').classList.remove('active');
            currentEditingTableId = null;
        }

        function saveTableSettings() {
            const table = tables.find(t => t.id === currentEditingTableId);
            if (table) {
                const newName = document.getElementById('settings-table-name').value.trim();
                const newSeats = parseInt(document.getElementById('settings-table-seats').value);

                if (!newName) {
                    alert('请输入餐桌名称');
                    return;
                }

                table.name = newName;

                if (newSeats !== table.seats) {
                    table.assignedGuests.forEach(guest => {
                        if (guest) {
                            guest.seated = false;
                            guest.tableId = null;
                            guest.seatIndex = null;
                        }
                    });

                    table.seats = newSeats;
                    table.assignedGuests = new Array(newSeats).fill(null);
                }

                closeTableSettingsModal();
                renderGuestList(document.getElementById('guest-search').value);
                renderTables();
            }
        }

        function searchGuests() {
            const filter = document.getElementById('guest-search').value;
            renderGuestList(filter);
        }

        function exportSeatingPlan() {
            const data = {
                guests: guests,
                tables: tables.map(t => ({
                    ...t,
                    assignedGuests: t.assignedGuests.map(g => g ? g.id : null)
                }))
            };

            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'wedding-seating-plan.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });

        initDemoData();
        renderGuestList();
        renderTables();
    </script>
</body>
</html>
